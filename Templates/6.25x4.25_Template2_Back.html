<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Postcard Back – Print Safe</title>

<style>
  /* =========================
     CONFIGURATION
     ========================= */
  :root {
    --trim-w: 6in;
    --trim-h: 4in;
    --bleed: 0.125in;
    --safe: 0.125in;

    --bkgclr: #b1121b;
    --hdrtxtclr: #FFF;
  }

  /* =========================
     GLOBAL / PREVIEW
     ========================= */
  body {
    margin: 0;
    background: #eaeaea;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
  }

  /* =========================
     SCREEN PREVIEW (FIT TO TRIM)
     ========================= */
  .preview-scale {
    transform-origin: center;
  }

  @media screen {
    .preview-scale {
      transform: scale(
        calc(
          min(
            (100vw - 40px) / var(--trim-w),
            (100vh - 40px) / var(--trim-h)
          )
        )
      );
    }
  }

  /* =========================
     PRINT LOCKDOWN (BLEED SIZE)
     ========================= */
  @media print {
    @page {
      size: calc(var(--trim-w) + 2 * var(--bleed))
            calc(var(--trim-h) + 2 * var(--bleed));
      margin: 0;
    }

    body {
      background: none;
    }

    .preview-scale {
      transform: none !important;
    }

    .guides {
      display: none !important;
    }
  }

  /* =========================
     BLEED / TRIM
     ========================= */
  .bleed-page {
    width: calc(var(--trim-w) + 2 * var(--bleed));
    height: calc(var(--trim-h) + 2 * var(--bleed));
    position: relative;
    background: white;
    border: 2px dashed rgba(0,128,0,0.5);
  }

  .trim {
    position: absolute;
    top: var(--bleed);
    left: var(--bleed);
    width: var(--trim-w);
    height: var(--trim-h);
    background: var(--bkgclr);
    overflow: hidden;
  }

  /* =========================
     TOGGLEABLE GUIDES
     ========================= */
  .guides {
    display: none;
    pointer-events: none;
  }

  body.show-guides .guides {
    display: block;
  }

  /*
.guide-bleed {
  position: absolute;
  top: var(--bleed);
  left: var(--bleed);
  right: var(--bleed);
  bottom: var(--bleed);
  border: 2px dashed rgba(0,128,0,0.5);
  z-index: 3;
}*/

  .guide-trim {
    position: absolute;
    inset: 0;
    border: 2px dashed rgba(255,0,0,0.5);
    z-index: 4;
  }

  .guide-safe {
    position: absolute;
    top: var(--safe);
    left: var(--safe);
    width: calc(var(--trim-w) - 2 * var(--safe));
    height: calc(var(--trim-h) - 2 * var(--safe));
    border: 2px dashed rgba(0,0,255,0.5);
    z-index: 5;
  }

  /* =========================
     YOUR ORIGINAL BACK DESIGN
     ========================= */

  /* TOP BRANDING */
  .top-branding {
    position: absolute;
    top: var(--safe);
    left: var(--safe);
    right: calc(var(--safe) + 1.25in);
    font-size: 0.20in;
    font-weight: bold;
    color: var(--hdrtxtclr);
    text-shadow: 0 0 6px rgba(0,0,0,0.4);
  }


  /* LEFT CONTENT */
  .left-content {
    position: absolute;
    top: calc(var(--safe) + 0.40in);
    left: var(--safe);
    width: 1.4in;
    color: white;
    text-shadow: 0 0 6px rgba(0,0,0,0.4);
  }

  .qr-placeholder {
    width: 1.0in;
    height: 1.0in;
    border: 2px solid #ffffff;
    border-radius: 6px;
    margin-bottom: 0.12in;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(255,255,255,0.3);
    box-sizing: border-box;
  }

  .cta {
    font-size: 0.13in;
    font-weight: bold;
    line-height: 1.25;
    margin-bottom: 0.15in;
  }

  ul {
    font-size: 0.15in;
    margin: 0;
    padding-left: 0.18in;
    line-height: 1.25;
  }

  /*new css*/
/* COUPON (top band) */
.coupon {
  position: absolute;
  top: var(--safe);
  right: var(--safe);
  width: 2.4in;   /* adjust as needed */
  height: 0.9in;

  border: 0.04in dashed #fff;
  color: #fff;

  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;

  text-align: center;
}

.coupon-main {
  font-size: 0.45in;
  font-weight: 800;
}

.coupon-sub {
  font-size: 0.14in;
}

/* SHOP NAME (independent, full width control) */
.shop-name {
  position: absolute;
  top: var(--safe);
  left: var(--safe);
  right: calc(var(--safe) + 2.6in); /* leaves room for coupon */

  font-size: 0.25in;
  font-weight: 800;
  color: #fff;
}

/* LEFT COLUMN (now below name) */
.left-column {
  position: absolute;
  top: calc(var(--safe) + 0.45in); /* below shop name */
  left: var(--safe);
  width: 1.6in;
}

/* ADDRESS */
.shop-address {
  font-size: 0.14in;
  margin-bottom: 0.08in;
}

/* PHONE */
.shop-phone {
  font-size: 0.16in;
  font-weight: 700;
  margin-bottom: 0.12in;
}

/* MAP (reuse your existing box) */
.map-box {
  width: 1.3in;
  height: 1.2in;
  border: 2px solid #fff;
  overflow: hidden;
}

.marketing {
  margin-top: 0.10in;
  padding-left: 0.18in;
}
  /*end new css*/

  /* ADDRESS BLOCK (UNCHANGED) */
  .address-block {
    position: absolute;

    left: calc(var(--trim-w) - var(--safe) - 4in);
    right: 0;                 /* reach trim */
    bottom: 0;

    width: auto;              /* ← THIS is the key change */
    height: 2.7in;

    background: white;
    box-sizing: border-box;
  }


  .barcode-clear {
    position: absolute;
    right: var(--safe);
    bottom: var(--safe);
    width: 4in;
    height: 0.625in;
    background: transparent;
  }
</style>
</head>

<body class="show-guides">

<div class="preview-scale">
  <div class="bleed-page">

    <!-- <div class="guide-bleed guides"></div> -->

    <div class="trim">
      <div class="guide-trim guides"></div>
      <div class="guide-safe guides"></div>

      <!-- COUPON -->
      <div class="coupon">
        <div class="coupon-main">$20 OFF</div>
        <div class="coupon-sub">Smog Check – Limited Time</div>
      </div>
<!-- SHOP NAME -->
<div class="shop-name">
  Clear Blue Smog Test
</div>

<!-- LEFT COLUMN -->
<div class="left-column">

  <div class="shop-address">
    123 Main St<br>
    San Jose, CA
  </div>

  <div class="shop-phone">
    (408) 555-1234
  </div>

  <div class="map-box">
    <img src="../data/TestOnlySmogII/map.png"
         style="width:100%;height:100%;object-fit:cover;">
  </div>
<ul class="marketing">
  <li>No appointment needed</li>
  <li>Fast, friendly service</li>
  <li>Easy, convenient location</li>
</ul>
</div>
      <!-- ADDRESS -->
      <div class="address-block"></div>
      <div class="barcode-clear"></div>

    </div>
  </div>
</div>

</body>
</html>
